version: 1
applications:
  - appRoot: kiro-collab-skill-kit
    frontend:
      phases:
        preBuild:
          commands:
            - npm install --no-audit --no-fund
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
